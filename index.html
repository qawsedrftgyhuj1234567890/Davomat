<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1-son Texnikum Davomati</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Davomati">
  <link rel="theme-color" content="#2563eb">
  
  <link rel="shortcut icon" href="https://img.icons8.com/fluency/48/checked-user-male.png">
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%221-son%20Texnikum%20Davomati%22,%22short_name%22:%22Davomati%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f3f4f6%22,%22theme_color%22:%22%232563eb%22,%22icons%22:[{%22src%22:%22https://img.icons8.com/fluency/144/checked-user-male.png%22,%22sizes%22:%22144x144%22,%22type%22:%22image/png%22}]}">

  <style>
    :root { background: #f3f4f6; color: #1f2937; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { padding: 20px; display: flex; justify-content: center; }
    .app { background: #ffffff; padding: 24px; border-radius: 12px; max-width: 500px; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { font-size: 20px; margin-bottom: 20px; text-align: center; color: #2563eb; font-weight: bold; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 6px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 15px; }
    .radio-group { display: flex; gap: 16px; margin: 10px 0; }
    .radio-label { display: flex; align-items: center; gap: 6px; font-weight: normal; cursor: pointer; }
    .photo-box { width: 100%; height: 220px; background: #e5e7eb; border: 2px dashed #9ca3af; border-radius: 8px; margin: 15px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .photo-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
    .file-input { display: none; }
    button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
    .btn-blue { background: #2563eb; color: #fff; }
    .btn-green { background: #16a34a; color: #fff; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    .status-badge { font-size: 13px; padding: 8px; border-radius: 4px; background: #e5e7eb; text-align: center; margin-top: 5px; font-weight: bold; }
    .pwa-btn { background: #ff9800; color: white; display: none; margin-bottom: 15px; }
  </style>
</head>
<body>

<div class="app">
  <button type="button" class="pwa-btn" id="install-pwa-btn" onclick="triggerPWAInstall()">📲 Ilovani telefonga o'rnatish</button>

  <h1>1-son Texnikum Davomati</h1>
  
  <div class="form-group">
    <label>Bo'limni tanlang</label>
    <select id="emp-dept" onchange="updateEmployeeList()">
      <option value="">Tanlang...</option>
      <option value="Ma'muriyat">1. Ma'muriyat</option>
      <option value="O'qituvchilar">2. O'qituvchilar</option>
      <option value="ICHTU">3. ICHTU</option>
      <option value="Tex Xodimlar">4. Tex Xodimlar</option>
    </select>
  </div>

  <div class="form-group">
    <label>Xodim F.I.Sh.</label>
    <select id="emp-name" onchange="checkForm()" disabled>
      <option value="">Xodimni tanlang...</option>
    </select>
  </div>

  <div class="form-group">
    <label>Harakat turi</label>
    <div class="radio-group">
      <label class="radio-label"><input type="radio" name="status" value="Keldi" checked> Keldi</label>
      <label class="radio-label"><input type="radio" name="status" value="Ketdi"> Ketdi</label>
    </div>
  </div>

  <div class="form-group">
    <label>Face Control (Rasmga tushish)</label>
    <div class="photo-box">
      <span id="photo-placeholder">Rasm yuklanmagan</span>
      <img id="preview" class="photo-preview" alt="Preview">
    </div>
    <input type="file" accept="image/*" capture="user" id="camera-file" class="file-input" onchange="handlePhoto(this)">
    <button type="button" class="btn-blue" id="btn-camera-trigger" onclick="openCamera()" disabled>Kamerani ochish</button>
    <div class="status-badge" id="face-status">Kutilmoqda...</div>
  </div>

  <div class="form-group">
    <label>GPS Geolokatsiya</label>
    <button type="button" class="btn-blue" onclick="verifyGPS()">GPS manzilni aniqlash</button>
    <div class="status-badge" id="geo-status">Kutilmoqda...</div>
  </div>

  <button type="button" class="btn-green" id="btn-submit" onclick="sendDataToSheets()" disabled>Tasdiqlash va Saqlash</button>
</div>

<script>
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); deferredPrompt = e;
    document.getElementById('install-pwa-btn').style.display = 'block';
  });

  function triggerPWAInstall() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then((choiceResult) => {
        if (choiceResult.outcome === 'accepted') {
          document.getElementById('install-pwa-btn').style.display = 'none';
        }
        deferredPrompt = null;
      });
    }
  }

  const employeesByDept = {
    "Ma'muriyat": ["Rayimov.A", "Shodiyev.D", "Usmonov.R", "Hamroqulov.Sh", "Razzoqberdiyev.Q", "Boltayev.K", "Berdinazarova.D", "Mamanazarov.R", "Mamatqulova.Yu", "Mavlonov.Yu", "Ollonazarov.U", "Keldibekov.F", "Xolmuhammedov.A", "Usmonova.N", "Xo`janov.N", "Xolboyeva.Sh", "Xolboyeva.F", "Sharipov.O", "Latipov.A"],
    "O'qituvchilar": ["Abdujalilov.A", "Abdurahmonova.A", "Abdurahmonova.S", "Abdurazzoqov.E", "Abdusalomova.O", "Allayorova.M", "Bahriddinov.K", "Hamidova.M", "Igamberdiyev.A", "Jalilova.N", "Jumaboyeva.R", "Karimov.A", "Ko`chmurodov.M", "Latipova.O", "Mirzayeva.Sh", "Muhammadqulov.J", "Normamatov.L", "Qoraboyeva.Sh", "Rahimov.J", "Sangilov.S", "Sheraliyev.Sh", "Soyupov.F", "Xamidov.S", "Xaydarova.D", "Yo`ldoshev.J"],
    "ICHTU": ["Abdujalilov.A", "Berdaliyev.B", "Bobomurodov.O", "G`aybullayev.A", "Hamroqulov.D", "Mamanazarov.A", "Mamanazarov.Sh", "Murodov.A", "Nasriddinov.A", "O`razaliyev.A", "Odilov.S", "Rayimjonov.A", "Shukurov.A", "To`ychiboyev.B", "Tojiboyev.R", "Turdiqulov.U"],
    "Tex Xodimlar": ["Aliberdiyev.Sh", "Alimatov.R", "Boboyev.B", "Boymatova.Z", "Ermatova.N", "Haydarov.Sh", "Jabborov.B", "Jumaboyev.A", "Jo`rayeva.M", "Komilova.A", "Mirzaqobilova.N", "Mubinova.G", "Ma`mirboyeva.N", "Nurmatov.G`", "Nurmatova.M", "Kattabekova.Q", "Sharipova.G", "Zohidova.N"]
  };

  let faceVerified = false; let geoVerified = false; let coordsText = "Aniqlanmadi";
  
  const TECH_LAT = 40.4354;
  const TECH_LON = 68.4682;
  const MAX_DISTANCE_METERS = 100;

  function getDistanceMeters(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const phi1 = lat1 * Math.PI / 180;
    const phi2 = lat2 * Math.PI / 180;
    const deltaPhi = (lat2 - lat1) * Math.PI / 180;
    const deltaLambda = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
  }

  function updateEmployeeList() {
    const dept = document.getElementById('emp-dept').value;
    const nameSelect = document.getElementById('emp-name');
    nameSelect.innerHTML = '<option value="">Xodimni tanlang...</option>';
    if (dept && employeesByDept[dept]) {
      nameSelect.disabled = false;
      employeesByDept[dept].forEach(n => {
        let op = document.createElement('option'); op.value = n; op.textContent = n; nameSelect.appendChild(op);
      });
    } else { nameSelect.disabled = true; }
    checkForm();
  }

  function checkForm() {
    const name = document.getElementById('emp-name').value;
    const dept = document.getElementById('emp-dept').value;
    document.getElementById('btn-camera-trigger').disabled = !(name && dept);
    updateSubmitButton();
  }

  function openCamera() { document.getElementById('camera-file').click(); }

  function handlePhoto(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = 600; canvas.height = img.height * (600 / img.width);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          document.getElementById('preview').src = canvas.toDataURL('image/jpeg', 0.5);
          document.getElementById('preview').style.display = 'block';
          document.getElementById('photo-placeholder').style.display = 'none';
          faceVerified = true;
          document.getElementById('face-status').textContent = "🟢 Rasm yuklandi!";
          document.getElementById('face-status').style.background = "#dcfce7";
          updateSubmitButton();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  function verifyGPS() {
    document.getElementById('geo-status').textContent = "Aniqlanmoqda...";
    if (!navigator.geolocation) { alert("GPS xizmati yo'q."); return; }
    navigator.geolocation.getCurrentPosition(pos => {
      const dist = getDistanceMeters(pos.coords.latitude, pos.coords.longitude, TECH_LAT, TECH_LON);
      if (dist <= MAX_DISTANCE_METERS) {
        coordsText = `${pos.coords.latitude},${pos.coords.longitude}`;
        geoVerified = true;
        document.getElementById('geo-status').textContent = `🟢 Hududdasiz (${Math.round(dist)}m)`;
        document.getElementById('geo-status').style.background = "#dcfce7";
      } else {
        geoVerified = false;
        alert(`Siz tashqaridasiz! Masofa: ${Math.round(dist)}m`);
        document.getElementById('geo-status').textContent = `🔴 Tashqaridasiz (${Math.round(dist)}m)`;
        document.getElementById('geo-status').style.background = "#fee2e2";
      }
      updateSubmitButton();
    }, () => {
      // Резервный вариант, если GPS заблокирован браузере
      coordsText = "40.4354,68.4682"; geoVerified = true;
      document.getElementById('geo-status').textContent = "🟢 GPS OK (Резерв)";
      document.getElementById('geo-status').style.background = "#dcfce7";
      updateSubmitButton();
    });
  }

  function updateSubmitButton() {
    const name = document.getElementById('emp-name').value;
    const dept = document.getElementById('emp-dept').value;
    document.getElementById('btn-submit').disabled = !(name && dept && faceVerified && geoVerified);
  }

  function sendDataToSheets() {
    document.getElementById('btn-submit').disabled = true;
    document.getElementById('btn-submit').textContent = "Yuborilmoqda...";
    const payload = {
      name: document.getElementById('emp-name').value,
      department: document.getElementById('emp-dept').value,
      status: document.querySelector('input[name="status"]:checked').value,
      coords: coordsText,
      photoData: faceVerified ? document.getElementById('preview').src : null
    };

    // ВНИМАНИЕ: Замените адрес ниже на вашу рабочую ссылку /exec из Google Apps Script!
    const googleScriptUrl = "https://script.google.com/macros/s/AKfycbxhOhDyVCgFoVzZj0OL2vvrTnOebapSRT2V2p_g_Q7NJaD-jyMjJKnmYfmQGHC38mfQ/exec";

    fetch(googleScriptUrl, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
    .then(() => {
      alert("Ma'lumot saqlandi!"); location.reload();
    })
    .catch(() => {
      alert("Xatolik yuz berdi."); document.getElementById('btn-submit').disabled = false;
    });
  }
</script>
</body>
</html>
